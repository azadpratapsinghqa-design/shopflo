name: Assignment 2 — Jest API Tests (FakeStoreAPI)

on:
  push:
    paths:
      - 'Assignment_2/**'
      - '.github/workflows/assignment_2.yml'
  pull_request:
    paths:
      - 'Assignment_2/**'

defaults:
  run:
    working-directory: Assignment_2

jobs:
  api-tests:
    name: API Tests — Node ${{ matrix.node-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ['18', '20']

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: 'Assignment_2/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Run API test suite
        run: npm test -- --forceExit
        env:
          CI: true

      - name: Upload JUnit results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: api-test-results-node${{ matrix.node-version }}
          path: Assignment_2/test-results/results.xml
          retention-days: 30